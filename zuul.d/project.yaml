- project:
    templates:
      - check-requirements
      - build-openstack-docs-pti
    check:
      jobs:
        - openstack-tox-pep8
        - manila-image-elements-buildimages
        - manila-image-elements-build-container
        - manila-image-elements-buildimage-docker:
            voting: false
        - manila-image-elements-container-scenario:
            voting: false
            irrelevant-files: &irrelevant-files
              - ^(test-|)requirements.txt$
              - ^setup.cfg$
              - ^.*\.rst$
              - ^doc/.*$
              - ^tox.ini$
        - manila-image-elements-generic-scenario:
            voting: false
            irrelevant-files: *irrelevant-files
    gate:
      jobs:
        - openstack-tox-pep8
        - manila-image-elements-buildimages
    periodic:
      jobs:
        - manila-image-elements-publish-artifacts
    post:
      jobs:
        - manila-image-elements-publish-artifacts
        - manila-image-elements-upload-container
